defaults: 
  - model: centerpoint_radar
  - _self_

seed: 47020

exp_id: ${model.name}_ep_${epochs}

data_root: data/view_of_delft
output_dir: outputs/${exp_id}

checkpoint_path:
checkpoint_monitor: validation/ROI/mAP
checkpoint_mode: max
eval_score_threshold:

class_namses: ['Car', 'Pedestrian', 'Cyclist']
# trainer:
num_workers: 2
val_num_workers: 0
gpus: [0] # will change in code: torch.cuda.device_count()
sync_bn: false
accumulate_grad_batches: 1
batch_size: 2
epochs: 50

# log settings
log_every: 50
val_every: 2
save_top_model: 5

