defaults: 
  - model: centerpoint_radar
  - _self_

seed: 47020

exp_id: ${model.name}_ep_${epochs}

data_root: data/view_of_delft
radar_source: radar # [radar, radar_3frames, radar_5frames]
radar_prioritize_recent: true
temporal_max_num_points: 10 # used when radar_source is temporal (3/5 frame)
radar_z_clip:
  enabled: false
  min: -2.5
  max: 2.0
radar_z_jitter_std: 0.0
radar_geo_aug:
  enabled: false
  flip_x_prob: 0.0
  flip_y_prob: 0.5
  rotation_deg: 0.0
  scale_min: 0.98
  scale_max: 1.02
output_dir: outputs/${exp_id}

checkpoint_path:
warm_start_checkpoint_path:
warm_start_strict: false
checkpoint_monitor: validation/ROI/mAP
checkpoint_mode: max
eval_score_threshold:

class_namses: ['Car', 'Pedestrian', 'Cyclist']
# trainer:
num_workers: 2
val_num_workers: 0
pin_memory: true
persistent_workers: true
prefetch_factor: 2
gpus: [0] # will change in code: torch.cuda.device_count()
sync_bn: false
accumulate_grad_batches: 1
batch_size: 2
epochs: 50
precision: 32-true
matmul_precision: high
benchmark: true
num_sanity_val_steps: 0

# log settings
log_every: 50
val_every: 1
save_top_model: 5
