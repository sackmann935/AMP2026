defaults: 
  - model: centerpoint_radar
  - _self_
exp_id: centerpoint_default_test

seed: 47020
gpus: [0] # will change in code: torch.cuda.device_count()
num_workers: 2
checkpoint_path: None
data_root: data/view_of_delft
radar_source: radar # [radar, radar_3frames, radar_5frames]
radar_prioritize_recent: true
radar_z_clip:
  enabled: false
  min: -2.5
  max: 2.0
output_dir: outputs/${exp_id}
