      final_kernel: 3
    loss_cls:
      reduction: mean
      loss_weight: 1.0
    loss_bbox:
      reduction: mean
      loss_weight: 0.25
    norm_bbox: true
    train_cfg:
      grid_size:
      - 320
      - 320
      - 1
      point_cloud_range:
      - 0
      - -25.6
      - -3
      - 51.2
      - 25.6
      - 2
      voxel_size:
      - 0.16
      - 0.16
      - 5
      out_size_factor: 2
      dense_reg: 1
      gaussian_overlap: 0.1
