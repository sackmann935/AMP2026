    group_norm_groups: 16
    freeze_bn:
      enabled: true
      freeze_epoch: 3
      freeze_affine: false
  optimizer:
    lr: 0.001
    weight_decay: 0.01
    scheduler:
      enabled: false
      warmup_epochs: 1.0
      warmup_steps: 0
      min_lr_ratio: 0.05
